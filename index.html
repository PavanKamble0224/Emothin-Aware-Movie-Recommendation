<!DOCTYPE html>
<html>
<head>
    <title>MoodFlix AI Final</title>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

    <style>
        body { margin:0; font-family:Arial; transition:0.4s; }
        body.dark { background:#0f0f0f; color:white; }
        body.light { background:linear-gradient(135deg,#ffdde1,#c2e9fb); color:#222; }

        header { text-align:center; padding:20px; }

        input {
            padding:10px;
            border-radius:20px;
            border:none;
            width:250px;
        }

        button {
            padding:10px;
            margin:5px;
            border:none;
            border-radius:20px;
            cursor:pointer;
        }

        body.dark button { background:#e50914; color:white; }
        body.light button { background:#ff4ecd; color:white; }

        .grid {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
            gap:20px;
            padding:20px;
        }

        .card {
            border-radius:10px;
            overflow:hidden;
            cursor:pointer;
            transition:0.3s;
        }

        body.dark .card { background:#1c1c1c; }
        body.light .card { background:white; }

        .card:hover { transform:scale(1.08); }

        .card img {
            width:100%;
            height:250px;
            object-fit:cover;
        }

        video {
            display:none;
            margin:auto;
            border-radius:10px;
        }

        .modal {
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.8);
            display:none;
            justify-content:center;
            align-items:center;
        }

        iframe { width:80%; height:60%; }
    </style>
</head>

<body class="dark">

<header>
    <h1>🎬 MoodFlix AI</h1>

    <input id="search" placeholder="Search movie...">

    <br><br>

    <button onclick="getMovies('popular')">🔥 Popular</button>
    <button onclick="toggleCamera()">🎭 Camera</button>
    <button onclick="startVoice()">🎤 Voice</button>
    <button onclick="toggleMode()">🌗 Mode</button>
</header>

<video id="video" width="300" autoplay muted playsinline></video>

<div id="movies" class="grid"></div>

<div id="modal" class="modal" onclick="closeModal()">
    <iframe id="trailer"></iframe>
</div>

<script>
const API_KEY = "PUT_YOUR_API_KEY_HERE";
const IMG = "https://image.tmdb.org/t/p/w500";
const BASE = "https://api.themoviedb.org/3/movie/";

let currentMovies = [];
let stream = null;
let cameraOn = false;

// ================= MOVIES =================
async function getMovies(type="popular") {
    try{
        const res = await fetch(`${BASE}${type}?api_key=${API_KEY}`);
        const data = await res.json();
        currentMovies = data.results || [];
        showMovies(currentMovies);
    }catch{
        alert("Movie API error ❌");
    }
}

function showMovies(movies) {
    let html = "";
    movies.forEach(m => {
        html += `
        <div class="card" onclick="playTrailer(${m.id})">
            <img src="${IMG + m.poster_path}">
            <h4>${m.title}</h4>
        </div>`;
    });
    document.getElementById("movies").innerHTML = html;
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", e => {
    let val = e.target.value.toLowerCase();
    let filtered = currentMovies.filter(m => m.title.toLowerCase().includes(val));
    showMovies(filtered);
});

// ================= CAMERA FIX =================
async function toggleCamera() {

    const video = document.getElementById("video");

    if (!cameraOn) {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" },
                audio: false
            });

            video.srcObject = stream;
            video.style.display = "block";
            cameraOn = true;

        } catch (err) {
            console.error(err);

            if (err.name === "NotAllowedError") {
                alert("Camera permission denied ❌");
            } else if (err.name === "NotFoundError") {
                alert("No camera found ❌");
            } else {
                alert("Camera not supported or in use ❌");
            }
        }

    } else {
        stopCamera();
    }
}

// STOP CAMERA
function stopCamera() {
    const video = document.getElementById("video");

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }

    video.style.display = "none";
    cameraOn = false;
}

// ================= VOICE FIX =================
function startVoice() {

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Use Chrome for voice feature 🎤");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";

    recognition.onstart = () => {
        console.log("Voice started...");
    };

    recognition.onresult = (e) => {
        let text = e.results[0][0].transcript.toLowerCase();

        console.log("You said:", text);

        if (text.includes("happy")) getMovies("popular");
        else if (text.includes("sad")) getMovies("top_rated");
        else if (text.includes("action")) getMovies("upcoming");
        else alert("Try: happy, sad, action");
    };

    recognition.onerror = () => {
        alert("Voice error ❌");
    };

    recognition.start();
}

// ================= TRAILER =================
async function playTrailer(id) {
    const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`);
    const data = await res.json();
    let v = data.results.find(x => x.type === "Trailer");

    if(v){
        document.getElementById("modal").style.display="flex";
        document.getElementById("trailer").src=`https://youtube.com/embed/${v.key}`;
    }
}

function closeModal(){
    document.getElementById("modal").style.display="none";
    document.getElementById("trailer").src="";
}

// ================= MODE =================
function toggleMode(){
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

// INIT
getMovies("popular");

</script>

</body>
</html>
