<!DOCTYPE html>
<html>
<head>
<title>EmoPlay AI Pro</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
body { margin:0; font-family:Arial; transition:0.4s; }
body.dark { background:#0f0f0f; color:white; }
body.light { background:linear-gradient(135deg,#ffdde1,#c2e9fb); color:#222; }

header {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    padding:15px;
    align-items:center;
}

.left-panel { display:flex; flex-direction:column; }

#userDisplay { font-weight:bold; margin-bottom:5px; }

.logo { text-align:center; font-size:24px; font-weight:bold; }

.right-panel { text-align:right; }

input {
    padding:8px;
    border-radius:20px;
    border:none;
}

button {
    padding:8px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.hero-row {
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:15px;
}

.hero-card {
    min-width:300px;
    height:180px;
    border-radius:10px;
    background-size:cover;
}

/* MOVIES */
.row {
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:20px;
}

.card {
    position:relative;
    min-width:180px;
    border-radius:12px;
    overflow:hidden;
    transition:0.4s;
}

.card:hover { transform:scale(1.1); }

.card img { width:100%; height:260px; object-fit:cover; }

.play-btn {
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    background:black;
    color:white;
    padding:10px;
    border-radius:50%;
    display:none;
}

.card:hover .play-btn { display:block; }

.info { padding:8px; }

.badge { font-size:10px; padding:2px 6px; border-radius:5px; }

.rating { background:#f5c518; }
.age { background:red; color:white; }
.genre { background:green; color:white; }

.modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
}

iframe { width:80%; height:60%; }

#emotionText {
    text-align:center;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body class="dark">

<header>

<div class="left-panel">
<div id="authBox">
<input id="username" placeholder="Username">
<button onclick="login()">Login</button>
</div>

<div id="userDisplay"></div>
<input id="search" placeholder="Search...">
</div>

<div class="logo">🎬 EmoPlay AI</div>

<div class="right-panel">
<button onclick="toggleCamera()">🎭</button>
<button onclick="startVoice()">🎤</button>
<button onclick="toggleMode()">🌗</button>
</div>

</header>

<h3 id="emotionText"></h3>

<div id="heroRow" class="hero-row"></div>
<div id="content"></div>

<video id="video" width="300" autoplay muted style="display:none;"></video>

<div id="modal" class="modal" onclick="closeModal()">
<iframe id="trailer"></iframe>
</div>

<script>
const API_KEY="b384060c08c6fe771268e9d4b1b9ed6f";
const IMG="https://image.tmdb.org/t/p/w500";
const BASE="https://api.themoviedb.org/3/movie/";

let stream=null,cameraOn=false,currentMovies=[];

// LOGIN
function login(){
    let u=username.value;
    if(!u) return alert("Enter username");

    localStorage.setItem("user",u);
    authBox.style.display="none";
    userDisplay.innerText="👤 "+u;
}

// HERO
async function loadHero(){
    let res=await fetch(`${BASE}popular?api_key=${API_KEY}`);
    let data=await res.json();

    heroRow.innerHTML=data.results.slice(0,10).map(m=>
        `<div class="hero-card" style="background:url(${IMG+m.backdrop_path}) center/cover"></div>`
    ).join("");
}

// MOVIES
async function loadMovies(type="popular"){
    let res=await fetch(`${BASE}${type}?api_key=${API_KEY}`);
    let data=await res.json();

    content.innerHTML='<div class="row">'+data.results.map(m=>`
        <div class="card" onclick="playTrailer(${m.id})">
            <img src="${IMG+m.poster_path}">
            <div class="play-btn">▶</div>
            <div class="info">
                <h4>${m.title}</h4>
                <span class="badge rating">⭐ ${m.vote_average}</span>
                <p>${m.overview.substring(0,60)}...</p>
            </div>
        </div>`).join("")+'</div>';
}

// SEARCH
search.oninput=async e=>{
    let q=e.target.value;
    if(q.length<2) return;

    let res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
    let data=await res.json();
    loadMovies("popular");
};

// TRAILER
async function playTrailer(id){
    let res=await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`);
    let data=await res.json();
    let v=data.results.find(x=>x.type==="Trailer");
    if(v){
        modal.style.display="flex";
        trailer.src=`https://youtube.com/embed/${v.key}`;
    }
}
function closeModal(){
    modal.style.display="none";
    trailer.src="";
}

// VOICE
function startVoice(){
    let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    let r=new SR();

    r.onresult=e=>{
        let t=e.results[0][0].transcript.toLowerCase();

        if(t.includes("happy")) loadMovies("popular");
        else if(t.includes("sad")) loadMovies("top_rated");
        else if(t.includes("action")) loadMovies("upcoming");
    };

    r.start();
}

// ================= AI FACE DETECTION =================
async function loadModels(){
    const URL="https://justadudewhohacks.github.io/face-api.js/models";
    await faceapi.nets.tinyFaceDetector.loadFromUri(URL);
    await faceapi.nets.faceExpressionNet.loadFromUri(URL);
}

async function toggleCamera(){
    if(!cameraOn){
        stream=await navigator.mediaDevices.getUserMedia({video:true});
        video.srcObject=stream;
        video.style.display="block";
        cameraOn=true;

        await loadModels();
        detectEmotion();
    } else stopCamera();
}

async function detectEmotion(){
    const interval=setInterval(async()=>{
        const res=await faceapi.detectSingleFace(video,new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();

        if(res){
            let emotions=res.expressions;
            let emotion=Object.keys(emotions).reduce((a,b)=>emotions[a]>emotions[b]?a:b);

            emotionText.innerText="Detected: "+emotion;

            if(emotion==="happy") loadMovies("popular");
            else if(emotion==="sad") loadMovies("top_rated");
            else if(emotion==="angry") loadMovies("upcoming");

            clearInterval(interval);
            stopCamera();
        }
    },1500);
}

function stopCamera(){
    stream.getTracks().forEach(t=>t.stop());
    video.style.display="none";
    cameraOn=false;
}

// MODE
function toggleMode(){
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

// INIT
loadHero();
loadMovies();
</script>

</body>
</html>
