<!DOCTYPE html>
<html>
<head>
    <title>MoodFlix Ultimate AI</title>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

    <style>
        body { margin:0; font-family:Arial; transition:0.4s; }
        body.dark { background:#0f0f0f; color:white; }
        body.light { background:linear-gradient(135deg,#ffdde1,#c2e9fb); color:#222; }

        header { text-align:center; padding:20px; }

        input {
            padding:10px;
            border-radius:20px;
            border:none;
            width:250px;
        }

        button {
            padding:10px;
            margin:5px;
            border:none;
            border-radius:20px;
            cursor:pointer;
            transition:0.3s;
        }

        body.dark button { background:#e50914; color:white; }
        body.light button { background:#ff4ecd; color:white; }

        button:hover { transform:scale(1.1); }

        .grid {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
            gap:20px;
            padding:20px;
        }

        .card {
            border-radius:10px;
            overflow:hidden;
            cursor:pointer;
            transition:0.3s;
        }

        body.dark .card { background:#1c1c1c; }
        body.light .card { background:white; }

        .card:hover { transform:scale(1.08); }

        .card img {
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .modal {
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.8);
            display:none;
            justify-content:center;
            align-items:center;
        }

        iframe { width:80%; height:60%; }

        video {
            display:none;
            margin:auto;
            border-radius:10px;
        }
    </style>
</head>

<body class="dark">

<header>
    <h1>🎬 MoodFlix AI Ultimate</h1>

    <input id="search" placeholder="Search movie...">

    <br><br>

    <button onclick="getMovies('popular')">🔥 Popular</button>
    <button onclick="toggleCamera()">🎭 Camera ON/OFF</button>
    <button onclick="startVoice()">🎤 Voice Mood</button>
    <button onclick="toggleMode()">🌗 Mode</button>
</header>

<video id="video" width="300" autoplay></video>

<div id="movies" class="grid"></div>

<div id="modal" class="modal" onclick="closeModal()">
    <iframe id="trailer"></iframe>
</div>

<script>
const API_KEY = "b384060c08c6fe771268e9d4b1b9ed6f";
const IMG = "https://image.tmdb.org/t/p/w500";
const BASE = "https://api.themoviedb.org/3/movie/";

let currentMovies = [];
let videoStream = null;
let detectionInterval = null;
let cameraOn = false;

// ================= MOVIES =================
async function getMovies(type="popular") {
    const res = await fetch(`${BASE}${type}?api_key=${API_KEY}`);
    const data = await res.json();
    currentMovies = data.results;
    showMovies(currentMovies);
}

function showMovies(movies) {
    let html = "";
    movies.forEach(m => {
        html += `
        <div class="card" onclick="playTrailer(${m.id})">
            <img src="${IMG + m.poster_path}">
            <h4>${m.title}</h4>
            <button onclick="saveFav(event, ${m.id})">❤️</button>
        </div>`;
    });
    document.getElementById("movies").innerHTML = html;
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", e => {
    let val = e.target.value.toLowerCase();
    let filtered = currentMovies.filter(m => m.title.toLowerCase().includes(val));
    showMovies(filtered);
});

// ================= TRAILER =================
async function playTrailer(id) {
    const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`);
    const data = await res.json();
    let v = data.results.find(x => x.type === "Trailer");
    if(v){
        document.getElementById("modal").style.display="flex";
        document.getElementById("trailer").src=`https://youtube.com/embed/${v.key}`;
    }
}

function closeModal(){
    document.getElementById("modal").style.display="none";
    document.getElementById("trailer").src="";
}

// ================= FAVORITES =================
function saveFav(e, id){
    e.stopPropagation();
    let favs = JSON.parse(localStorage.getItem("favs") || "[]");
    if(!favs.includes(id)){
        favs.push(id);
        localStorage.setItem("favs", JSON.stringify(favs));
        alert("Added to favorites ❤️");
    }
}

// ================= MODE =================
function toggleMode(){
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

// ================= CAMERA TOGGLE =================
async function toggleCamera(){

    const video = document.getElementById("video");

    if(!cameraOn){
        try{
            videoStream = await navigator.mediaDevices.getUserMedia({video:true});
            video.srcObject = videoStream;
            video.style.display="block";
            cameraOn = true;

            await faceapi.nets.tinyFaceDetector.loadFromUri(
                "https://justadudewhohacks.github.io/face-api.js/models"
            );

            detectionInterval = setInterval(async ()=>{
                const detections = await faceapi.detectAllFaces(
                    video,
                    new faceapi.TinyFaceDetectorOptions()
                );

                if(detections.length > 0){
                    getMovies("popular");
                }
            },2000);

        }catch(err){
            alert("Camera error ❌");
        }

    } else {
        stopCamera();
    }
}

// STOP CAMERA
function stopCamera(){
    const video = document.getElementById("video");

    if(videoStream){
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
    }

    if(detectionInterval){
        clearInterval(detectionInterval);
        detectionInterval = null;
    }

    video.style.display="none";
    cameraOn = false;
}

// ================= VOICE (IMPROVED) =================
function startVoice(){

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Voice not supported in this browser");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";

    recognition.onresult = e => {

        let text = e.results[0][0].transcript.toLowerCase();

        if(text.includes("happy") || text.includes("fun")){
            getMovies("popular");
        }
        else if(text.includes("sad") || text.includes("emotional")){
            getMovies("top_rated");
        }
        else if(text.includes("action") || text.includes("angry")){
            getMovies("upcoming");
        }
        else{
            alert("Try saying: happy, sad, or action");
        }
    };

    recognition.start();
}

// ================= INIT =================
getMovies("popular");

</script>

</body>
</html>
