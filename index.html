<!DOCTYPE html>
<html>
<head>
    <title>MoodFlix AI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            transition: 0.4s;
        }

        /* DARK MODE */
        body.dark {
            background: #0f0f0f;
            color: white;
        }

        /* LIGHT MODE */
        body.light {
            background: linear-gradient(135deg, #ffdde1, #ee9ca7, #c2e9fb);
            color: #222;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        .mood-buttons {
            text-align: center;
            margin: 20px;
        }

        button {
            margin: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        body.dark button {
            background: #e50914;
            color: white;
        }

        body.light button {
            background: #ff4ecd;
            color: white;
        }

        button:hover {
            transform: scale(1.1);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .movie-card {
            border-radius: 12px;
            overflow: hidden;
            transition: 0.4s;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body.dark .movie-card {
            background: #1c1c1c;
        }

        body.light .movie-card {
            background: white;
        }

        .movie-card:hover {
            transform: scale(1.08);
        }

        .movie-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .movie-card h3 {
            padding: 8px;
            font-size: 14px;
        }

        .movie-card p {
            padding: 0 8px 10px;
            font-size: 12px;
        }
    </style>
</head>

<body class="dark">

<header>
    <h1>🎬 MoodFlix</h1>
    <p>Choose your vibe 🎧</p>
    <button onclick="toggleMode()">🌗 Toggle Mode</button>
</header>

<div class="mood-buttons">
    <button onclick="filterMovies('high')">🔥 Trending</button>
    <button onclick="filterMovies('mid')">⭐ Popular</button>
    <button onclick="filterMovies('low')">🎧 Chill</button>
</div>

<h2 id="title">All Movies</h2>

<div id="movies" class="movie-grid"></div>

<script>
    const allMovies = [
        {title:"The White Stripes", year:1999, rating:0},
        {title:"De Stijl", year:2000, rating:0},
        {title:"White Blood Cells", year:2001, rating:61},
        {title:"Elephant", year:2003, rating:6},
        {title:"Get Behind Me Satan", year:2005, rating:3},
        {title:"Icky Thump", year:2007, rating:2},
        {title:"Under Great White Northern Lights", year:2010, rating:11},
        {title:"Live in Mississippi", year:2011, rating:0},
        {title:"Live at the Gold Dollar", year:2012, rating:0},
        {title:"Nine Miles from the White City", year:2013, rating:0}
    ];

    function displayMovies(list) {
        const container = document.getElementById("movies");
        container.innerHTML = "";

        list.forEach(movie => {
            let card = document.createElement("div");
            card.className = "movie-card";

            card.innerHTML = `
                <img src="https://via.placeholder.com/300x400?text=${encodeURIComponent(movie.title)}">
                <h3>${movie.title}</h3>
                <p>Year: ${movie.year}</p>
                <p>Rating: ${movie.rating}</p>
            `;

            container.appendChild(card);
        });
    }

    function filterMovies(type) {
        let filtered;

        if (type === "high") {
            filtered = allMovies.filter(m => m.rating >= 10);
        } else if (type === "mid") {
            filtered = allMovies.filter(m => m.rating > 0 && m.rating < 10);
        } else {
            filtered = allMovies.filter(m => m.rating === 0);
        }

        displayMovies(filtered);
        document.getElementById("title").innerText = type.toUpperCase() + " Movies";
    }

    function toggleMode() {
        document.body.classList.toggle("dark");
        document.body.classList.toggle("light");
    }

    // AUTO LOAD (VERY IMPORTANT)
    window.onload = function () {
        displayMovies(allMovies);
    };
</script>

</body>
</html>
