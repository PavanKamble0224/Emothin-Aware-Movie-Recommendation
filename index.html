<!DOCTYPE html>
<html>
<head>
    <title>Emotion Movie Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎬 MoodFlix</h1>
    <p>Choose your mood. We’ll pick your movie.</p>
</header>

<div class="mood-buttons">
    <button onclick="getMovies('romantic')">❤️ Romantic</button>
    <button onclick="getMovies('happy')">😄 Happy</button>
    <button onclick="getMovies('sad')">😢 Sad</button>
    <button onclick="getMovies('action')">🔥 Action</button>
    <button onclick="getMovies('thriller')">😱 Thriller</button>
</div>

<h2 id="title"></h2>

<div id="movies" class="movie-grid"></div>

<script src="script.js"></script>

</body>
</html>
