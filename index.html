<!DOCTYPE html>
<html>
<head>
    <title>MoodFlix Pro</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            transition: 0.4s;
        }

        body.dark {
            background: #0f0f0f;
            color: white;
        }

        body.light {
            background: linear-gradient(135deg, #ffdde1, #ee9ca7, #c2e9fb);
            color: #222;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 20px;
            border: none;
            margin-top: 10px;
        }

        .controls {
            text-align: center;
            margin: 20px;
        }

        button {
            margin: 6px;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        body.dark button {
            background: #e50914;
            color: white;
        }

        body.light button {
            background: #ff4ecd;
            color: white;
        }

        button:hover {
            transform: scale(1.1);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .movie-card {
            border-radius: 12px;
            overflow: hidden;
            transition: 0.4s;
            cursor: pointer;
        }

        body.dark .movie-card {
            background: #1c1c1c;
        }

        body.light .movie-card {
            background: white;
        }

        .movie-card:hover {
            transform: scale(1.08);
        }

        .movie-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .movie-card h3 {
            padding: 8px;
            font-size: 14px;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal iframe {
            width: 80%;
            height: 60%;
        }
    </style>
</head>

<body class="dark">

<header>
    <h1>🎬 MoodFlix PRO</h1>
    <p>AI-like Movie Recommender</p>

    <input type="text" id="search" placeholder="Search movie...">

    <br><br>
    <button onclick="toggleMode()">🌗 Mode</button>
</header>

<div class="controls">
    <button onclick="getMovies('popular')">🔥 Popular</button>
    <button onclick="getMovies('top_rated')">⭐ Top Rated</button>
    <button onclick="getMovies('upcoming')">🚀 Upcoming</button>
</div>

<div id="movies" class="movie-grid"></div>

<div id="modal" class="modal" onclick="closeModal()">
    <iframe id="trailer" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>

const API_KEY = "YOUR_API_KEY_HERE";

const IMG_URL = "https://image.tmdb.org/t/p/w500";
const BASE_URL = "https://api.themoviedb.org/3/movie/";

let currentMovies = [];

// FETCH MOVIES
async function getMovies(type) {
    const res = await fetch(`${BASE_URL}${type}?api_key=${API_KEY}`);
    const data = await res.json();

    currentMovies = data.results;
    displayMovies(currentMovies);
}

// DISPLAY
function displayMovies(movies) {
    const container = document.getElementById("movies");
    container.innerHTML = "";

    movies.forEach(movie => {
        let card = document.createElement("div");
        card.className = "movie-card";

        card.innerHTML = `
            <img src="${IMG_URL + movie.poster_path}">
            <h3>${movie.title}</h3>
        `;

        card.onclick = () => playTrailer(movie.id);

        container.appendChild(card);
    });
}

// SEARCH
document.getElementById("search").addEventListener("input", () => {
    let value = document.getElementById("search").value.toLowerCase();

    let filtered = currentMovies.filter(m =>
        m.title.toLowerCase().includes(value)
    );

    displayMovies(filtered);
});

// TRAILER
async function playTrailer(id) {
    const res = await fetch(
        `https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`
    );
    const data = await res.json();

    let video = data.results.find(v => v.type === "Trailer");

    if (video) {
        document.getElementById("modal").style.display = "flex";
        document.getElementById("trailer").src =
            `https://www.youtube.com/embed/${video.key}`;
    }
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("trailer").src = "";
}

// MODE
function toggleMode() {
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

// LOAD DEFAULT
getMovies("popular");

</script>

</body>
</html>
