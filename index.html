<!DOCTYPE html>
<html>
<head>
    <title>MoodFlix AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<header>
    <h1>🎬 MoodFlix</h1>
    <p>Choose your vibe 🎧</p>

    <button class="toggle-btn" onclick="toggleMode()">🌗 Mode</button>
</header>

<div class="mood-buttons">
    <button onclick="filterMovies('high')">🔥 Trending</button>
    <button onclick="filterMovies('mid')">⭐ Popular</button>
    <button onclick="filterMovies('low')">🎧 Chill</button>
</div>

<h2 id="title"></h2>

<div id="movies" class="movie-grid"></div>

<script src="script.js"></script>

</body>
</html>
