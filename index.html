<!DOCTYPE html>
<html>
<head>
<title>EmoPlay Pro</title>

<style>
body { margin:0; font-family:Arial; }
body.dark { background:#0f0f0f; color:white; }
body.light { background:linear-gradient(135deg,#ffdde1,#c2e9fb); color:#222; }

/* HEADER */
header {
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items:center;
    padding:15px;
}

/* LEFT */
.left {
    display:flex;
    flex-direction:column;
}

/* CENTER */
.center {
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

/* USER */
#userDisplay {
    font-weight:bold;
    margin-bottom:5px;
}

/* HERO SCROLL */
.hero-row {
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:15px;
}

.hero-card {
    min-width:300px;
    height:180px;
    border-radius:10px;
    background-size:cover;
    background-position:center;
}

/* MOVIES */
.row {
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:20px;
}

.card {
    min-width:180px;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.1);
}

.card img {
    width:100%;
    height:250px;
    object-fit:cover;
}

/* PLAY BUTTON */
.play-btn {
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    display:none;
}

.card:hover .play-btn {
    display:block;
}

/* MODAL */
.modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

iframe { width:80%; height:60%; }
</style>
</head>

<body class="dark">

<header>

<!-- LEFT -->
<div class="left">
<div id="authBox">
<input id="username" placeholder="Username">
<button onclick="login()">Login</button>
</div>

<div id="userDisplay"></div>

<input id="search" placeholder="Search...">
</div>

<!-- CENTER -->
<div class="center">🎬 EmoPlay</div>

<!-- RIGHT -->
<div style="text-align:right;">
<button onclick="toggleMode()">🌗</button>
<button onclick="startVoice()">🎤</button>
<button onclick="toggleCamera()">🎭</button>
</div>

</header>

<!-- HERO SCROLL -->
<div id="heroRow" class="hero-row"></div>

<!-- MOVIES -->
<div id="movies" class="row"></div>

<video id="video" width="300" autoplay muted style="display:none;"></video>

<div id="modal" class="modal" onclick="closeModal()">
<iframe id="trailer"></iframe>
</div>

<script>

// CONFIG
const API_KEY = "b384060c08c6fe771268e9d4b1b9ed6f";
const IMG = "https://image.tmdb.org/t/p/w500";

// ================= LOGIN =================
function login(){
    let u=document.getElementById("username").value;
    if(!u) return alert("Enter username");

    localStorage.setItem("user",u);
    updateUI();
}

function updateUI(){
    let u=localStorage.getItem("user");

    if(u){
        document.getElementById("authBox").style.display="none";
        document.getElementById("userDisplay").innerText="👤 "+u;
    }
}

updateUI();

// ================= HERO =================
async function loadHero(){
    const res=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`);
    const data=await res.json();

    let html="";

    data.results.slice(0,10).forEach(m=>{
        html+=`
        <div class="hero-card"
        style="background-image:url(${IMG+m.backdrop_path})">
        </div>`;
    });

    document.getElementById("heroRow").innerHTML=html;
}

// ================= MOVIES =================
async function loadMovies(){
    const res=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`);
    const data=await res.json();

    displayMovies(data.results);
}

// DISPLAY
function displayMovies(movies){
    let html="";

    movies.forEach(m=>{
        html+=`
        <div class="card" onclick="playTrailer(${m.id})">
            <img src="${IMG+m.poster_path}">
            <h4>${m.title}</h4>
        </div>`;
    });

    document.getElementById("movies").innerHTML=html;
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", async e=>{
    let q=e.target.value;
    if(q.length<2) return;

    const res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
    const data=await res.json();

    displayMovies(data.results);
});

// ================= TRAILER =================
async function playTrailer(id){
    const res=await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`);
    const data=await res.json();

    let v=data.results.find(x=>x.type==="Trailer");

    if(v){
        modal.style.display="flex";
        trailer.src=`https://youtube.com/embed/${v.key}`;
    }
}

function closeModal(){
    modal.style.display="none";
    trailer.src="";
}

// ================= CAMERA =================
let stream=null, cameraOn=false;

async function toggleCamera(){
    let v=document.getElementById("video");

    if(!cameraOn){
        stream=await navigator.mediaDevices.getUserMedia({video:true});
        v.srcObject=stream;
        v.style.display="block";
        cameraOn=true;
    } else {
        stream.getTracks().forEach(t=>t.stop());
        v.style.display="none";
        cameraOn=false;
    }
}

// ================= VOICE =================
function startVoice(){
    let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return alert("Use Chrome");

    let r=new SR();
    r.onresult=e=>{
        let t=e.results[0][0].transcript.toLowerCase();
        if(t.includes("action")) loadMovies();
        else if(t.includes("romantic")) loadMovies();
    };
    r.start();
}

// ================= MODE =================
function toggleMode(){
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

// INIT
loadHero();
loadMovies();

</script>

</body>
</html>
