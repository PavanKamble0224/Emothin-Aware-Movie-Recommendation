<!DOCTYPE html>
<html>
<head>
<title>MoodFlix Pro OTT</title>

<style>
body { margin:0; font-family:Arial; transition:0.4s; }
body.dark { background:#0f0f0f; color:white; }
body.light { background:linear-gradient(135deg,#ffdde1,#c2e9fb); color:#222; }

header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
}

.logo { font-size:24px; font-weight:bold; }

input {
    padding:8px;
    border-radius:20px;
    border:none;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    margin-left:5px;
}

.hero {
    height:300px;
    display:flex;
    align-items:end;
    padding:20px;
    background-size:cover;
    background-position:center;
}

.section { padding:20px; }

.row {
    display:flex;
    overflow-x:auto;
    gap:15px;
}

.card {
    min-width:180px;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover { transform:scale(1.08); }

.card img { width:100%; height:250px; object-fit:cover; }

.card h4 { padding:5px; font-size:14px; }
.card p { padding:5px; font-size:12px; }

video {
    display:none;
    margin:auto;
    border-radius:10px;
}

.modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

iframe { width:80%; height:60%; }
</style>
</head>

<body class="dark">

<header>
<div class="logo">🎬 MoodFlix</div>

<input id="search" placeholder="Search...">

<div>
<button onclick="toggleCamera()">🎭</button>
<button onclick="startVoice()">🎤</button>
<button onclick="toggleMode()">🌗</button>
</div>
</header>

<div id="hero" class="hero"></div>

<div id="content"></div>

<video id="video" width="300" autoplay muted></video>

<div id="modal" class="modal" onclick="closeModal()">
<iframe id="trailer"></iframe>
</div>

<script>
const API_KEY = "b384060c08c6fe771268e9d4b1b9ed6f";
const IMG = "https://image.tmdb.org/t/p/w500";
const BASE = "https://api.themoviedb.org/3/movie/";

let stream=null;
let cameraOn=false;
let currentMovies=[];

// HERO SECTION
function setHero(movie){
    document.getElementById("hero").style.backgroundImage =
        `url(${IMG + movie.backdrop_path})`;
}

// LOAD SECTION
async function loadSection(type){
    const res = await fetch(`${BASE}${type}?api_key=${API_KEY}`);
    const data = await res.json();

    currentMovies = data.results;
    setHero(currentMovies[0]);

    displaySection(type, currentMovies);
}

// DISPLAY
function displaySection(title, movies){

    let html = `<div class="section"><h2>${title}</h2><div class="row">`;

    movies.forEach(m=>{
        html += `
        <div class="card" onclick="playTrailer(${m.id})">
            <img src="${IMG+m.poster_path}">
            <h4>${m.title}</h4>
            <p>⭐ ${m.vote_average}</p>
            <p>${getAge(m.vote_average)}</p>
            <button onclick="saveFav(event,${m.id})">❤️</button>
        </div>`;
    });

    html += "</div></div>";

    document.getElementById("content").innerHTML = html;
}

// AGE
function getAge(r){
    if(r>=8) return "18+";
    if(r>=6) return "16+";
    return "13+";
}

// SEARCH
document.getElementById("search").addEventListener("input", async e=>{
    let q = e.target.value;
    if(q.length<2) return;

    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
    const data = await res.json();

    displaySection("Search", data.results);
});

// TRAILER
async function playTrailer(id){
    const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`);
    const data = await res.json();

    let v = data.results.find(x=>x.type==="Trailer");

    if(v){
        document.getElementById("modal").style.display="flex";
        document.getElementById("trailer").src=`https://youtube.com/embed/${v.key}`;
    }
}

function closeModal(){
    document.getElementById("modal").style.display="none";
    document.getElementById("trailer").src="";
}

// CAMERA
async function toggleCamera(){
    const video = document.getElementById("video");

    if(!cameraOn){
        try{
            stream = await navigator.mediaDevices.getUserMedia({video:true});
            video.srcObject = stream;
            video.style.display="block";
            cameraOn=true;

            setTimeout(()=>loadSection("popular"),3000);

        }catch{
            alert("Camera error ❌");
        }
    } else stopCamera();
}

function stopCamera(){
    const video=document.getElementById("video");
    if(stream) stream.getTracks().forEach(t=>t.stop());
    video.style.display="none";
    cameraOn=false;
}

// VOICE
function startVoice(){
    let SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ alert("Use Chrome"); return; }

    let r=new SR();

    r.onresult=e=>{
        let t=e.results[0][0].transcript.toLowerCase();

        if(t.includes("action")) loadSection("popular");
        else if(t.includes("romantic")) loadSection("top_rated");
        else if(t.includes("new")) loadSection("upcoming");
        else alert("Say: action, romantic, new");
    };

    r.start();
}

// FAVORITES
function saveFav(e,id){
    e.stopPropagation();
    let f=JSON.parse(localStorage.getItem("fav")||"[]");
    if(!f.includes(id)){
        f.push(id);
        localStorage.setItem("fav",JSON.stringify(f));
        alert("Saved ❤️");
    }
}

// MODE
function toggleMode(){
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

// INIT
loadSection("popular");
</script>

</body>
</html>
