<!DOCTYPE html>
<html>
<head>
    <title>MoodFlix AI Ultimate</title>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

    <style>
        body { margin:0; font-family:Arial; transition:0.4s; }
        body.dark { background:#0f0f0f; color:white; }
        body.light { background:linear-gradient(135deg,#ffdde1,#c2e9fb); color:#222; }

        header { text-align:center; padding:20px; }

        button {
            padding:10px; margin:5px;
            border:none; border-radius:20px;
            cursor:pointer;
        }

        body.dark button { background:#e50914; color:white; }
        body.light button { background:#ff4ecd; color:white; }

        .grid {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
            gap:20px; padding:20px;
        }

        .card {
            background:#1c1c1c;
            border-radius:10px;
            overflow:hidden;
            cursor:pointer;
            transition:0.3s;
        }

        .card:hover { transform:scale(1.08); }

        .card img { width:100%; height:250px; object-fit:cover; }

        .modal {
            position:fixed; top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.8);
            display:none;
            justify-content:center;
            align-items:center;
        }

        iframe { width:80%; height:60%; }
    </style>
</head>

<body class="dark">

<header>
    <h1>🎬 MoodFlix AI Ultimate</h1>

    <input id="search" placeholder="Search movie...">

    <br><br>

    <button onclick="getMovies('popular')">🔥 Popular</button>
    <button onclick="startCamera()">🎭 Detect Emotion</button>
    <button onclick="startVoice()">🎤 Speak Mood</button>
    <button onclick="toggleMode()">🌗 Mode</button>
</header>

<video id="video" width="300" autoplay style="display:none;"></video>

<div id="movies" class="grid"></div>

<div id="modal" class="modal" onclick="closeModal()">
    <iframe id="trailer"></iframe>
</div>

<script>
const API_KEY = "b384060c08c6fe771268e9d4b1b9ed6f";
const IMG = "https://image.tmdb.org/t/p/w500";
const BASE = "https://api.themoviedb.org/3/movie/";

let currentMovies = [];

// ================= MOVIES =================
async function getMovies(type="popular") {
    const res = await fetch(`${BASE}${type}?api_key=${API_KEY}`);
    const data = await res.json();
    currentMovies = data.results;
    showMovies(currentMovies);
}

function showMovies(movies) {
    let html = "";
    movies.forEach(m => {
        html += `
        <div class="card" onclick="playTrailer(${m.id})">
            <img src="${IMG + m.poster_path}">
            <h4>${m.title}</h4>
            <button onclick="saveFav(event, ${m.id})">❤️</button>
        </div>`;
    });
    document.getElementById("movies").innerHTML = html;
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", e => {
    let val = e.target.value.toLowerCase();
    let filtered = currentMovies.filter(m => m.title.toLowerCase().includes(val));
    showMovies(filtered);
});

// ================= TRAILER =================
async function playTrailer(id) {
    const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`);
    const data = await res.json();
    let v = data.results.find(x => x.type === "Trailer");
    if(v){
        document.getElementById("modal").style.display="flex";
        document.getElementById("trailer").src=`https://youtube.com/embed/${v.key}`;
    }
}

function closeModal(){
    document.getElementById("modal").style.display="none";
    document.getElementById("trailer").src="";
}

// ================= FAVORITES =================
function saveFav(e, id){
    e.stopPropagation();
    let favs = JSON.parse(localStorage.getItem("favs") || "[]");
    if(!favs.includes(id)){
        favs.push(id);
        localStorage.setItem("favs", JSON.stringify(favs));
        alert("Added to favorites ❤️");
    }
}

// ================= MODE =================
function toggleMode(){
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

// ================= VOICE AI =================
function startVoice(){
    let rec = new webkitSpeechRecognition();
    rec.onresult = e => {
        let text = e.results[0][0].transcript.toLowerCase();

        if(text.includes("happy")) getMovies("popular");
        else if(text.includes("sad")) getMovies("top_rated");
        else if(text.includes("angry")) getMovies("upcoming");
        else alert("Try saying happy, sad, or angry");
    };
    rec.start();
}

// ================= FACE AI =================
async function startCamera(){
    const video = document.getElementById("video");
    video.style.display="block";

    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;

    await faceapi.nets.tinyFaceDetector.loadFromUri(
        "https://justadudewhohacks.github.io/face-api.js/models"
    );

    setInterval(async ()=>{
        const detections = await faceapi.detectAllFaces(video,new faceapi.TinyFaceDetectorOptions());
        
        if(detections.length > 0){
            alert("Face detected 😄 → showing popular movies");
            getMovies("popular");
        }
    }, 3000);
}

// ================= INIT =================
getMovies("popular");
</script>

</body>
</html>
